name: nex_poket
description: NexPoket - Smart Digital Pocket App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 WALLET
  bip39: ^1.0.6
  web3dart: ^2.7.1
  http: ^1.2.0
  bip32: ^2.0.0

  # 🔥 REQUIRED (FIXED)
  crypto: ^3.0.3
  hex: ^0.2.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1

  # 🔐 NEW (IMPORTANT)
  flutter_secure_storage: ^9.0.0

  mobile_scanner: ^3.5.5
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/bip39_english.txt

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21