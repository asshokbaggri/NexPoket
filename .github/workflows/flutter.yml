name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ CLEAN (IMPORTANT)
      - name: Clean project
        run: flutter clean

      # ✅ GET DEPENDENCIES
      - name: Install dependencies
        run: flutter pub get

      # ⚠️ SAFE ICON GENERATION (NO FAIL)
      - name: Generate App Icons
        run: dart run flutter_launcher_icons || true

      # ✅ ENSURE SYNC
      - name: Reinstall dependencies
        run: flutter pub get

      # 🔥 MAIN FIX (IMPORTANT)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # ✅ VERIFY APK EXISTS (DEBUG STEP)
      - name: Check APK
        run: ls -lah build/app/outputs/flutter-apk/

      # ✅ UPLOAD APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexpoket-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
