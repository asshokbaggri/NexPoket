name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ CLEAN
      - name: Clean project
        run: flutter clean

      # ✅ DEPENDENCIES
      - name: Install dependencies
        run: flutter pub get

      # ⚠️ ICONS (SAFE)
      - name: Generate App Icons
        run: dart run flutter_launcher_icons || true

      # ✅ SYNC AGAIN
      - name: Reinstall dependencies
        run: flutter pub get

      # 🔥 BUILD APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 🔍 DEBUG (SEE ALL FILES)
      - name: Debug Build Folder
        run: |
          echo "===== FULL BUILD OUTPUT ====="
          ls -R build/

      # 🔍 FIND APK (IMPORTANT)
      - name: Find APK
        run: |
          echo "Searching for APK..."
          find build -name "*.apk"

      # ✅ UPLOAD (AUTO DETECT)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexpoket-apk
          path: build/app/outputs/**/*.apk
