name: Android APK Build (Final Fix)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Setup Java (IMPORTANT)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔥 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Get dependencies
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      # 🔥 Build using Gradle directly (BYPASS)
      - name: Build APK (Direct Gradle)
        run: |
          cd mobile_app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 🔍 Check APK
      - name: Find APK
        run: |
          find mobile_app -name "*.apk"

      # 📦 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexpoket-apk
          path: mobile_app/android/app/build/outputs/apk/release/app-release.apk
