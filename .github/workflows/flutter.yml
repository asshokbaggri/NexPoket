name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🔥 FORCE ICON GENERATION (CRITICAL FIX)
      - name: Generate App Icons
        run: dart run flutter_launcher_icons

      # 🔥 EXTRA FIX (ENSURE RESOURCES REFRESH)
      - name: Rebuild after icon generation
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexpoket-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
